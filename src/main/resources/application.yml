spring:
  application:
    name: smartdoc-api

  datasource:
    url: jdbc:postgresql://localhost:5432/smartdoc
    username: ${DB_USERNAME:smartdoc}
    password: ${DB_PASSWORD:smartdoc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

smartdoc:
  chunk:
    size: 1000         # characters per chunk
    overlap: 200       # overlap between chunks
  retrieval:
    top-k: 5           # number of similar chunks to retrieve
    similarity-threshold: 0.75
  upload:
    allowed-types:
      - application/pdf
      - text/plain
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document

logging:
  level:
    com.smartdoc: DEBUG
    org.springframework.ai: INFO
