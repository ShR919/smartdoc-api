version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartdoc-postgres
    environment:
      POSTGRES_DB: smartdoc
      POSTGRES_USER: smartdoc
      POSTGRES_PASSWORD: smartdoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoc"]
      interval: 10s
      timeout: 5s
      retries: 5

  smartdoc-api:
    build: .
    container_name: smartdoc-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartdoc
      SPRING_DATASOURCE_USERNAME: smartdoc
      SPRING_DATASOURCE_PASSWORD: smartdoc
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
